<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f6fbfc">
    <title>PanicDrive</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/logo/panicdrive-mark.png" type="image/png+xml">
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="#/" aria-label="PanicDrive home">
        <img class="brand-mark" src="assets/logo/panicdrive-mark.png" alt="">
        <span class="brand-title">PanicDrive</span>
      </a>
      <button class="icon-button" id="themeToggle" type="button" aria-label="Cambia tema" title="Cambia tema">
        <span class="theme-icon" aria-hidden="true"></span>
      </button>
    </header>

    <main class="app-shell">
      <section class="search-panel" aria-label="Ricerca rapida">
        <label class="search-box">
          <span class="search-icon" aria-hidden="true"></span>
          <input id="globalSearch" type="search" placeholder="Cerca patologie, esami, numeri, tag..." autocomplete="off">
        </label>
        <div class="search-results" id="searchResults" hidden></div>
      </section>

      <section id="view" class="view" aria-live="polite"></section>
    </main>

    <div class="modal-backdrop" id="updateModal" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="updateTitle">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Aggiornamento da revisionare</p>
            <h2 id="updateTitle">Confronto modifiche</h2>
          </div>
          <button class="icon-button" id="closeModal" type="button" aria-label="Chiudi">
            <span class="close-icon" aria-hidden="true"></span>
          </button>
        </div>
        <div id="updateSummary" class="modal-content"></div>
        <div class="modal-actions">
          <button class="secondary-button" id="saveDraftUpdate" type="button">Salva bozza</button>
          <button class="secondary-button" id="rejectUpdate" type="button">Rifiuta</button>
          <button class="primary-button" id="acceptUpdate" type="button">Accetta aggiornamento</button>
        </div>
      </section>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
